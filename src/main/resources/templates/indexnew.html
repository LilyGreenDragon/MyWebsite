<!DOCTYPE html>
<html lang="ru" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="maximum-scale=1.0, user-scalable=yes">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Егорчик</title>

    <link th:href="@{/css/style.css}" type="text/css" rel="stylesheet" />
    <link th:href="@{/css/windowTheme.css}" type="text/css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</head>

<body>
<img id="img1" src="">

<!-- Основной контейнер вместо таблицы wrap -->
<div class="wrap" style="width: 78%; margin: 0 auto; border: 1px solid #000000; background-color: #FFFFFF;">

    <!-- Шапка с логотипом -->
    <div style="height: 85px; display: flex; align-items: center; padding-left: 20px;">
        <img src="/images/logo.jpg" align="middle" />
    </div>

    <!-- Меню -->
    <div class="menu-row" style="display: flex; align-items: center; text-align: center; height: 38px; background-color: transparent;">
        <!-- Левая часть меню -->
        <div style="width: 7%;"></div>

        <!-- Кнопка "Это я!" -->
        <div style="width: 10%; height: 38px;">
            <div style="background-image:url(/images/menu_11.jpg); background-repeat:no-repeat; background-size: 100% 100%; width: 100%; height:38px; display: flex; align-items: center; justify-content: center;">
                <form id="admin" th:action="@{/admin/adminIn}" method="GET" target="_self">
                    <button id="admb" type="submit" class="but2">Это я!</button>
                </form>
            </div>
        </div>

        <!-- Центральное меню -->
        <div style="width: 57%; height: 38px;">
            <div style="background-image:url(/images/menu.jpg); background-repeat:no-repeat; background-size: 100% 100%; width: 100%; height:35px; display: flex; align-items: center; justify-content: center;">
                <div style="display: flex; width: 100%; justify-content: space-around;">
                    <a href="#" onclick="about();return false;" class="menutxt1">Обо мне</a>
                    <a th:href="@{/photo}" class="menutxt1">Фотографии</a>
                    <a th:href="@{/video}" class="menutxt1">Видео</a>
                    <a th:href="@{/holiday}" class="menutxt1">Мероприятия</a>
                    <a th:href="@{/news}" class="menutxt1">Новости</a>
                    <a th:href="@{/myPage}" class="menutxt1">Кабинетик</a>
                </div>
            </div>
        </div>

        <!-- Кнопка "Выйти" -->
        <div style="width: 19%; height: 38px;">
            <div style="background-image:url(/images/subscribe.jpg); background-repeat:no-repeat; background-size: 100% 100%; width: 100%; height:35px; display: flex; align-items: center; justify-content: center;">
                <form id="out" th:action="@{/logout}" method="POST" target="_self">
                    <button id="outb" type="submit" class="but">Выйти</button>
                </form>
            </div>
        </div>

        <div style="width: 7%;"></div>
    </div>

    <!-- Отступ -->
    <div style="height: 50px;"></div>

    <!-- Основной контент -->
    <div style="display: flex; min-height: 472px;">
        <!-- Левая колонка с отступом -->
        <div style="width: 7%;"></div>

        <!-- Центральная колонка с изображением -->
        <div style="width: 35%;">
            <img src="/images/middle_image.jpg" style="width: 100%;" />
        </div>

        <!-- Разделитель -->
        <div style="width: 2%;"></div>

        <!-- Правая колонка с текстом и изображениями -->
        <div style="width: 49%;">
            <!-- Верхний отступ -->
            <div style="height: 40px;"></div>

            <!-- Блок с текстом -->
            <div id="middletext" class="middletxt" style="background-image:url(../images/middle_text.jpg); background-repeat: no-repeat; background-size: auto 259px; background-position: center; width: 100%; height: 259px;">
                <div style="display: flex; flex-direction: column; height: 100%; padding: 20px;">
                    <div style="display: flex; align-items: center; height: 56px;">
                        <div style="width: 10%;"></div>
                        <div id="i" class="bodyhead" style="flex: 1;">Привет, я Егор!</div>
                        <div style="width: 6%;"></div>
                    </div>
                    <div style="display: flex; flex: 1; align-items: center;">
                        <div style="width: 10%;"></div>
                        <div id="about" class="bodytxt" style="flex: 1; text-align: center;">Я расскажу вам про мою семью, наши мероприятия и праздники.</div>
                        <div style="width: 6%;"></div>
                    </div>
                </div>
            </div>

            <!-- Блок с изображениями -->
            <div style="margin-top: 20px;">
                <div class="footer" style="background-image:url(/images/image_bg.jpg); width: 100%; height: 125px; display: flex; align-items: center; justify-content: center;">
                    <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
                        <a rel="simplebox" href="/images/image11.jpg">
                            <img width="86" src="/images/image11.jpg" style="border: none;">
                        </a>
                        <a rel="simplebox" href="/images/image22.jpg">
                            <img width="86" src="/images/image22.jpg" style="border: none;">
                        </a>
                        <a rel="simplebox" href="/images/image33.jpg">
                            <img width="86" src="/images/image33.jpg" style="border: none;">
                        </a>
                        <a rel="simplebox" href="/images/image44.jpg">
                            <img width="86" src="/images/image44.jpg" style="border: none;">
                        </a>
                        <a rel="simplebox" href="/images/image55.jpg">
                            <img width="86" src="/images/image55.jpg" style="border: none;">
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Правая колонка с отступом -->
        <div style="width: 7%;"></div>
    </div>

    <!-- Отступ -->
    <div style="height: 50px;"></div>

    <!-- Футер -->
    <div style="width: 100%;">
        <div class="footer" style="background-image:url(/images/footer.jpg); height: 60px; width: 100%;">
            <div style="height: 60px; display: flex; flex-direction: column; padding: 0 56px; box-sizing: border-box;">
                <!-- Верхняя часть футера с кнопками -->
                <div style="display: flex; justify-content: space-between; height: 34px;">
                    <!-- Кнопка удаления аккаунта -->
                    <div style="background-image:url(/images/subscribe_end.jpg); background-repeat:no-repeat; width:204px; height:34px;">
                        <form id="delete" th:method="DELETE" th:action="@{/}" th:object="${person}">
                            <input type="button" onclick="sweetAlert()" id="del" class="but" value="Удалить аккаунт" />
                        </form>
                    </div>

                    <!-- Кнопка темы окна -->
                    <div style="background-image:url(/images/subscribe_end.jpg); background-repeat:no-repeat; width:204px; height:34px; margin-left: auto;">
                        <form id="formImageTheme" th:method="POST" th:action="@{/home}" th:object="${person}">
                            <input type="button" id="openModalBtn" class="but" value="Тема окна" />

                            <!-- Модальное окно -->
                            <div id="myModal" class="modal">
                                <div class="modal-content">
                                    <div class="selectdivboot">
                                        <div class="btn-group">
                                            <button type="button" class="btn btn-info dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                                                Выберите вариант
                                            </button>
                                            <ul class="dropdown-menu">
                                                <li><a class="dropdown-item" href="#" onclick="original();return false;">Оригинал</a></li>
                                                <li><a class="dropdown-item" href="#" onclick="car();return false;">Машинки</a></li>
                                                <li><a class="dropdown-item" href="#" onclick="plane();return false;">Самолетики</a></li>
                                                <li><a class="dropdown-item" href="#" onclick="city();return false;">Город</a></li>
                                                <li><a class="dropdown-item" href="#" onclick="flower();return false;">Цветы</a></li>
                                            </ul>
                                        </div>
                                    </div>
                                    <br>
                                    <div class="selectdivbutton">
                                        <button type="submit" class="btn2" id="submitBtn2">Применить</button>
                                        <button type="button" class="btn2" id="closeModalBtn">Закрыть</button>
                                    </div>
                                </div>
                            </div>
                            <input type="hidden" id="hiddenFieldTheme" th:field="*{imageTheme}"/>
                            <input type="hidden" id="hiddenFieldDate" th:field="*{birthdate}"/>
                        </form>
                    </div>
                </div>

                <!-- Нижняя часть футера с именем пользователя -->
                <div style="height: 23px; display: flex; justify-content: flex-end; align-items: center;">
                    <p style="margin:1px 10px; font-size: 12px;">Добрый день, <span style="font-size: 12px; color:white;" th:text="${person?.username}">VALUE</span> !</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Скрипты -->
<script type="text/javascript" src="/js/aboutMe.js"></script>
<script type="text/javascript" src="/js/theme.js"></script>
<script type="text/javascript" src="/js/simplebox_util.js"></script>
<script type="text/javascript">
    (function(){
        var boxes=[],els,i,l;
        if(document.querySelectorAll){
            els=document.querySelectorAll('a[rel=simplebox]');
            Box.getStyles('simplebox_css','/css/simplebox.css');
            Box.getScripts('simplebox_js','/js/simplebox.js',function(){
                simplebox.init();
                for(i=0,l=els.length;i<l;++i)
                    simplebox.start(els[i]);
                simplebox.start('a[rel=simplebox_group]');
            });
        }
    })();
</script>

<script>
    function sweetAlert() {
        swal({
            title: "Вы уверены?",
            text: "Находясь в здравом уме, твердой памяти и ясном сознании, действуя добровольно, понимая значение своих действий и не заблуждаясь, соглашаюсь на удаление своего аккаунта! Хи-хи))",
            icon: "warning",
            buttons: ["Нет", "Да"],
            dangerMode: true,
        }).then((willDelete) => {
            if (willDelete) {
                document.getElementById("delete").submit();
            }
        });
    }
</script>
</body>
</html>
