<!DOCTYPE html>
<html lang="ru" xmlns:th="http://thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Видео</title>
    <link th:href="@{/css/modalWindow.css}" type="text/css" rel="stylesheet" />
    <link th:href="@{/css/templatemo_style.css}" type="text/css" rel="stylesheet" />
</head>
<body>
<div class="modalBackground">
    <div class="modalActive">
        <div class="modalClose">
            <img src="/images/cross.png" />
        </div>
        <div class="modalWindow">
            <div id="modal">
                <video src = "" id = "modalImg" controls="controls" > </video> <br />
            </div>
            <img class = "arrow" src = "/images/left_arrow.png"   onClick = "left_arrow()" />
            <img class = "arrow" src = "/images/right_arrow.png"  onClick = "right_arrow()" />

        </div>
    </div>
</div>

<span id="top"></span>
<div id="templatemo_wrapper_photo">
    <div id="templatmeo_header_photo">

        <div id="site_title">
            <h1><a href=""></a></h1>
        </div>

        <div id="templatemo_menu">
            <ul>
                <li><a th:href="@{/home}">Дом</a></li>
                <li class="last"><a th:href="@{/myPage}">Кабинетик</a></li>
            </ul>
        </div> <!-- end of templatemo_menu -->
    </div> <!-- end of header -->

    <div id="templatemo_main_photo">

        <div id="services" class="content_top"></div>
        <div class="content_box_photo">
            <div class="content_title content_contactus"></div>

            <h2>Видео</h2>
            <div class="cleaner"></div>

            <div id="gallerygv">
                <ul>
                    <li class="float_l"><span></span><video width="207" poster="/images/video/1.jpg" onclick="modalWindow(this.src)" src="/images/video/1.mp4"  ></video></li>
                    <li class="float_l"><span></span><video width="207"  poster="/images/video/2.jpg" onclick="modalWindow(this.src)" src="/images/video/2.mp4"  ></video></li>
                    <li class="float_r"><span></span><video width="207"  poster="/images/video/3.jpg" onclick="modalWindow(this.src)" src="/images/video/3.mp4"  ></video></li>
                </ul>
            </div>

            <div class="cleaner h50"></div>
            <div class="cleaner"></div>
            <a href="#" class="gototop">Наверх</a>

        </div> <!-- end of content_box -->
    </div> <!-- end of templatemo_main -->
</div><!-- end of warpper -->

<script type="text/javascript" src="/js/modalWindowVideo.js"></script>
</body>
</html>
